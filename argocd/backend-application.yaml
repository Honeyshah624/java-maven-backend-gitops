apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-maven-backend-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Honeyshah624/java-maven-backend-gitops.git
    targetRevision: main
    path: apps/backend/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: backend-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true